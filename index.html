<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine Website</title>
    <style>
        :root {
            --bg: #0f172a;
            --text: #f8fafc;
            --accent: #38bdf8;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 400px;
            padding: 2rem;
        }
        h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        p { color: #94a3b8; margin-bottom: 2rem; }
        .links { display: flex; flex-direction: column; gap: 1rem; }
        a {
            text-decoration: none;
            color: var(--text);
            border: 1px solid #334155;
            padding: 1rem;
            border-radius: 12px;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        a:hover {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Willkommen</h1>
        <p>Dies ist meine neue Website auf meiner eigenen Domain.</p>
        <div class="links">
            <a href="https://github.com/DEIN-NUTZERNAME">Mein GitHub</a>
            <a href="mailto:hallo@deine-domain.com">Kontakt</a>
            </div>
    </div>
</body>
</html>
